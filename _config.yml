title: Micromass Athenæum
description: A community space for mathematical exploration, learning, and discovery.
baseurl: "/math-server.github.io"
url: "https://microfrosty.github.io"
author: Micromass Athenæum
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/
kramdown:
  math_engine: mathjax
  input: GFM
plugins:
  - jekyll-feed
  - jekyll-seo-tag
theme: null
math_categories:
  - name: Calculus
    slug: calculus
    icon: "∫"
  - name: Linear Algebra
    slug: linear-algebra
    icon: "⊗"
  - name: Number Theory
    slug: number-theory
    icon: "ℕ"
  - name: Topology
    slug: topology
    icon: "∞"
  - name: Probability & Statistics
    slug: probability-statistics
    icon: "μ"
  - name: Abstract Algebra
    slug: abstract-algebra
    icon: "∘"
  - name: Real Analysis
    slug: real-analysis
    icon: "ε"
  - name: Discrete Mathematics
    slug: discrete-mathematics
    icon: "∑"
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .git
  - README.md
